name: Bug report
description: Report a defect or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Reminder: OrthoAI is research / educational software and is **not** a medical device. See [DISCLAIMER.md](../../blob/main/DISCLAIMER.md). Do not include real patient data in this issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main @ abc1234
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Clinical reasoning / decision support
        - LLM / prompts
        - Memory / retrieval
        - DICOM / imaging
        - UI
        - Build / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: This issue contains no real patient data or PHI
          required: true
