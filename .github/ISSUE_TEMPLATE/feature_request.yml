name: Feature request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is it for?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Clinical reasoning / decision support
        - LLM / prompts
        - Memory / retrieval
        - DICOM / imaging
        - UI
        - Build / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
    validations:
      required: false
