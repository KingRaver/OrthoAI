version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    groups:
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
          - '@testing-library/*'
      next:
        patterns:
          - next
          - eslint-config-next
          - '@next/*'
      eslint:
        patterns:
          - eslint
          - 'eslint-*'
          - '@eslint/*'
      types:
        patterns:
          - '@types/*'
        exclude-patterns:
          - '@types/react'
          - '@types/react-dom'
      vitest:
        patterns:
          - vitest
          - '@vitest/*'
          - '@vitejs/*'
          - jsdom
      tailwind:
        patterns:
          - tailwindcss
          - '@tailwindcss/*'
          - postcss
      cornerstone:
        patterns:
          - '@cornerstonejs/*'
          - dicom-parser

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
